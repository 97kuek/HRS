services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hrs_dev
      POSTGRES_USER: hrs_user
      POSTGRES_PASSWORD: hrs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrs_user -d hrs_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
